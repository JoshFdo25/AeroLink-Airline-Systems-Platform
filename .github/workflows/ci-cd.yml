name: AeroLink CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - '.github/workflows/**'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_PREFIX: aerolink
  AWS_ACCOUNT_ID: 643942183295

permissions:
  contents: write

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, flight-service, booking-service, baggage-service, frontend]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY_PREFIX }}-${{ matrix.service }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Use root context for frontend (monorepo deps), app context for others
          if [ "${{ matrix.service }}" = "frontend" ]; then
            CONTEXT="."
          else
            CONTEXT="apps/${{ matrix.service }}"
          fi
          
          # Build the Docker image
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f apps/${{ matrix.service }}/Dockerfile $CONTEXT
          
          # Push the image to AWS ECR
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          
          # Also tag as latest
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  update-kustomize:
    name: Update Kustomize Image Tags
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update kustomization.yaml
        run: |
          cd k8s/overlays/prod
          # Update all 5 services to the newly built image tags
          kustomize edit set image aerolink-auth-service=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY_PREFIX }}-auth-service:${{ github.sha }}
          kustomize edit set image aerolink-flight-service=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY_PREFIX }}-flight-service:${{ github.sha }}
          kustomize edit set image aerolink-booking-service=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY_PREFIX }}-booking-service:${{ github.sha }}
          kustomize edit set image aerolink-baggage-service=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY_PREFIX }}-baggage-service:${{ github.sha }}
          kustomize edit set image aerolink-frontend=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY_PREFIX }}-frontend:${{ github.sha }}
          
      - name: Commit and Push Changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git commit -am "chore: update image tags to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main
